<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova - Real Estate AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f1117; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 20px; text-align: center; border-bottom: 1px solid #2a2a3e; }
    #header h1 { font-size: 24px; color: #7c6af7; }
    #header p { font-size: 14px; color: #888; margin-top: 4px; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; }
    .user { background: #7c6af7; align-self: flex-end; }
    .nova { background: #1e1e2e; align-self: flex-start; border: 1px solid #2a2a3e; white-space: pre-wrap; }
    #input-area { padding: 20px; border-top: 1px solid #2a2a3e; display: flex; gap: 12px; }
    #input { flex: 1; background: #1e1e2e; border: 1px solid #2a2a3e; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 15px; outline: none; }
    #input:focus { border-color: #7c6af7; }
    #send { background: #7c6af7; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; }
    #send:hover { background: #6a59e0; }
    #send:disabled { background: #444; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Nova</h1>
    <p>Your Real Estate Wholesaling Assistant</p>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Ask Nova anything..." />
    <button id="send">Send</button>
  </div>
  <script>
    const API_URL = 'https://nova-ai-production-acec.up.railway.app/chat';
    const SESSION_ID = 'session_' + Date.now();
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      send.disabled = true;
      addMessage(text, 'user');
      addMessage('Nova is thinking...', 'nova');
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: SESSION_ID })
        });
        const data = await res.json();
        messages.lastChild.textContent = data.reply;
      } catch (e) {
        messages.lastChild.textContent = 'Error connecting to Nova.';
      }
      send.disabled = false;
      input.focus();
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
