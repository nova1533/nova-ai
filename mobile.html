<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Nova</title>
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --card: #060A14;
    --border: #122036;
    --border-strong: #1B2E4D;
    --blue: #378ADD;
    --blue-soft: #2A6FB8;
    --blue-bright: #5BA8F0;
    --yellow: #EF9F27;
    --text: #FFFFFF;
    --text-muted: #6B7E9C;
    --text-dim: #3F506B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; height: 100dvh; }

  /* ── Layout ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .hamburger {
    width: 40px; height: 40px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; background: transparent; border: none;
    cursor: pointer; padding: 6px; border-radius: 8px;
  }
  .hamburger:active { background: rgba(55,138,221,0.1); }
  .hamburger span {
    display: block; width: 20px; height: 1.5px;
    background: var(--text-muted); border-radius: 2px;
  }

  /* ── Slide-in menu ── */
  .menu-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .menu-overlay.open { opacity: 1; pointer-events: all; }
  .menu-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 270px;
    background: var(--card);
    border-left: 1px solid var(--border);
    padding: 0 0 40px;
    z-index: 51;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(40px, env(safe-area-inset-bottom));
  }
  .menu-panel.open { transform: translateX(0); }
  .menu-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 16px 24px;
  }
  .menu-header-title { font-size: 16px; font-weight: 600; }
  .menu-close-btn {
    background: transparent; border: none;
    color: var(--text-muted); font-size: 18px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .menu-section {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--text-dim); padding: 12px 20px 8px;
  }
  .menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; cursor: pointer;
    color: var(--text-muted); font-size: 15px; font-weight: 500;
    transition: all 0.15s;
  }
  .menu-item:active, .menu-item.active {
    background: rgba(55,138,221,0.10); color: var(--text);
  }
  .menu-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; opacity: 0.5; flex-shrink: 0;
  }
  .menu-item.active .menu-dot { background: var(--blue); opacity: 1; box-shadow: 0 0 8px var(--blue); }

  /* ── Main scrollable area ── */
  .main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .main-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 12px 20px max(40px, env(safe-area-inset-bottom));
    min-height: 100%;
  }

  /* ── Orb ── */
  .orb-wrap {
    width: min(310px, 84vw);
    height: min(310px, 84vw);
    position: relative;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin: 8px 0 0;
  }
  .orb-svg { width: 100%; height: 100%; overflow: visible; }

  .dust-shell { fill: none; stroke: #2A6FB8; stroke-width: 0.4; opacity: 0.25; }
  .dust-particle {
    fill: #5BA8F0;
    transform-box: fill-box; transform-origin: center;
    animation: dustRadial 5s ease-in-out infinite;
  }
  .dust-particle.bright { fill: #7FBFFF; }
  .dust-particle.star { fill: #EF9F27; }
  .dust-particle.star.bright { fill: #FFC76A; }
  .dust-shell-anim { animation: dustShell 5s ease-in-out infinite; transform-origin: center; }

  .orb-dust.listening .dust-particle { animation-duration: 1.6s; }
  .orb-dust.listening .dust-shell-anim { animation-duration: 1.6s; }
  .orb-dust.thinking .dust-particle { animation-duration: 2.4s; }
  .orb-dust.thinking .dust-shell-anim { animation-duration: 2.4s; }
  .orb-dust.speaking .dust-particle {
    animation: none;
    transform: translate(calc(var(--tx)*var(--amp,14px)*var(--voice-amp,0)), calc(var(--ty)*var(--amp,14px)*var(--voice-amp,0)));
    transition: transform 60ms linear;
  }
  .orb-dust.speaking .dust-shell-anim {
    animation: none;
    transform: scale(calc(0.95 + 0.18*var(--voice-amp,0)));
    opacity: calc(0.18 + 0.18*var(--voice-amp,0));
    transition: transform 60ms linear, opacity 60ms linear;
  }
  @keyframes dustRadial {
    0%,100% { transform: translate(calc(var(--tx)*-6px),calc(var(--ty)*-6px)); }
    50%      { transform: translate(calc(var(--tx)*var(--amp,14px)),calc(var(--ty)*var(--amp,14px))); }
  }
  @keyframes dustShell {
    0%,100% { transform: scale(0.95); opacity: 0.18; }
    50%      { transform: scale(1.10); opacity: 0.32; }
  }
  .orb-wrap.listening::after {
    content: ''; position: absolute; inset: -10px; border-radius: 50%;
    border: 2px solid var(--blue); opacity: 0.4;
    animation: listenPulse 1.2s ease-out infinite;
  }
  @keyframes listenPulse {
    0% { transform: scale(0.96); opacity: 0.5; }
    100% { transform: scale(1.08); opacity: 0; }
  }

  /* ── Hint ── */
  .hint {
    font-size: 13px; color: var(--text-muted);
    margin: 10px 0 14px; text-align: center;
    min-height: 20px;
  }
  .hint.listening { color: var(--blue); }
  .hint.thinking  { color: var(--text-muted); }

  /* ── Input bar ── */
  .input-bar {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 6px 6px 4px;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .input-bar:focus-within { border-color: var(--blue-soft); box-shadow: 0 0 0 4px rgba(55,138,221,0.08); }
  .input-bar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 15px;
    padding: 10px 16px; font-family: inherit;
  }
  .input-bar input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: rgba(55,138,221,0.15); border: 1px solid var(--border-strong);
    color: var(--blue); transition: all 0.15s; flex-shrink: 0;
  }
  .send-btn:active:not(:disabled) { background: var(--blue); color: #fff; }
  .send-btn:disabled { opacity: 0.4; }

  /* ── Transcript ── */
  .transcript {
    margin-top: 20px; width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .transcript-msg {
    display: grid; grid-template-columns: 40px 1fr;
    gap: 10px; padding: 8px 0; align-items: start;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .transcript-msg + .transcript-msg { border-top: 1px solid rgba(55,138,221,0.06); }
  .msg-who {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; padding-top: 2px;
  }
  .msg-who.you  { color: var(--text-muted); }
  .msg-who.nova { color: var(--blue); }
  .msg-text { font-size: 14px; line-height: 1.55; color: var(--text); }
  .msg-text.you { color: #C8D4E8; }

  .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue); animation: typingDot 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingDot {
    0%,60%,100% { transform: scale(0.7); opacity: 0.4; }
    30% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = 'https://nova-ai-production-acec.up.railway.app';
const SESSION_ID = 'mobile_' + Date.now();

/* ── Orb particles ── */
function OrbDust() {
  const particles = React.useMemo(() => {
    const arr = [];
    let seed = 7;
    const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const R = 130;
    let count = 0, attempts = 0;
    while (count < 1200 && attempts < 5000) {
      attempts++;
      const x = (rand() * 2 - 1) * R, y = (rand() * 2 - 1) * R;
      const d = Math.sqrt(x*x + y*y);
      if (d > R) continue;
      const edgeBias = d / R;
      if (edgeBias < 0.55 && rand() > edgeBias * 0.9) continue;
      const bright = rand() > 0.85, star = rand() < 0.08;
      const r = star ? 1.0 + rand()*0.7 : bright ? 0.9 + rand()*0.6 : 0.4 + rand()*0.5;
      const tx = d > 0.01 ? x/d : (rand()*2-1), ty = d > 0.01 ? y/d : (rand()*2-1);
      const amp = 6 + edgeBias * 22 + rand() * 4;
      arr.push({ x, y, r, bright, star, tx, ty, amp });
      count++;
    }
    return arr;
  }, []);

  return (
    <svg className="orb-svg" viewBox="-160 -160 320 320">
      <defs>
        <radialGradient id="dg" cx="50%" cy="50%">
          <stop offset="0%"   stopColor="#378ADD" stopOpacity="0.15" />
          <stop offset="80%"  stopColor="#378ADD" stopOpacity="0.02" />
          <stop offset="100%" stopColor="#378ADD" stopOpacity="0" />
        </radialGradient>
      </defs>
      <circle r="140" fill="url(#dg)" />
      <circle className="dust-shell dust-shell-anim" r="130" />
      {particles.map((p, i) => (
        <circle key={i}
          className={`dust-particle ${p.bright?'bright':''} ${p.star?'star':''}`}
          cx={p.x} cy={p.y} r={p.r}
          style={{'--tx':p.tx.toFixed(3),'--ty':p.ty.toFixed(3),'--amp':p.amp.toFixed(1)+'px'}}
        />
      ))}
    </svg>
  );
}

/* ── Voice envelope (simulated) ── */
function useVoiceEnvelope(ref, active) {
  useEffect(() => {
    if (!ref.current) return;
    if (!active) { ref.current.style.setProperty('--voice-amp','0'); return; }
    let raf, smoothed = 0;
    const start = performance.now();
    const tick = (now) => {
      const t = (now - start) / 1000;
      const carrier = 0.45 + 0.45 * Math.sin(t * 2 * Math.PI * 4.2);
      const flutter = 0.15 * Math.sin(t * 2 * Math.PI * 7.8 + 1.3);
      const slow    = 0.10 * Math.sin(t * 2 * Math.PI * 1.1);
      const gate    = Math.sin(t * 2 * Math.PI * 0.6) > 0.85 ? 0.3 : 1;
      let target = Math.max(0, Math.min(1, (carrier + flutter + slow) * gate));
      smoothed += (target - smoothed) * 0.35;
      if (ref.current) ref.current.style.setProperty('--voice-amp', smoothed.toFixed(3));
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [active, ref]);
}

function Orb({ state, onClick, orbRef }) {
  const wrapRef = useRef(null);
  // Use real audio ref if provided, otherwise simulate
  const activeRef = orbRef || wrapRef;
  useVoiceEnvelope(activeRef, state === 'speaking' && !orbRef);
  return (
    <div ref={el => { wrapRef.current = el; if (orbRef) orbRef.current = el; }} className={`orb-wrap orb-dust ${state}`} onClick={onClick}>
      <OrbDust />
    </div>
  );
}

/* ── Slide-in menu ── */
function Menu({ open, onClose, active, setActive }) {
  const items = [
    { id: 'home',      label: 'Home' },
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'history',   label: 'History' },
    { id: 'schedule',  label: 'Schedule' },
    { id: 'tasks',     label: 'Tasks' },
  ];
  const select = (id) => { setActive(id); onClose(); };
  return (
    <>
      <div className={`menu-overlay ${open ? 'open' : ''}`} onClick={onClose} />
      <div className={`menu-panel ${open ? 'open' : ''}`}>
        <div className="menu-header">
          <div className="menu-header-title">Nova</div>
          <button className="menu-close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="menu-section">MENU</div>
        {items.map(item => (
          <div key={item.id} className={`menu-item ${active === item.id ? 'active' : ''}`} onClick={() => select(item.id)}>
            <span className="menu-dot"></span>
            <span>{item.label}</span>
          </div>
        ))}
      </div>
    </>
  );
}

/* ── Input bar ── */
function InputBar({ onSend, disabled }) {
  const [val, setVal] = useState('');
  const submit = () => { const v = val.trim(); if (!v || disabled) return; onSend(v); setVal(''); };
  return (
    <div className="input-bar">
      <input
        type="text" placeholder="Type a message…"
        value={val} onChange={e => setVal(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && submit()}
        disabled={disabled}
      />
      <button className="send-btn" onClick={submit} disabled={!val.trim() || disabled}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
        </svg>
      </button>
    </div>
  );
}

/* ── Transcript ── */
function Transcript({ messages, isThinking }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.scrollIntoView({ behavior: 'smooth' }); }, [messages, isThinking]);
  if (!messages.length && !isThinking) return null;
  return (
    <div className="transcript">
      {messages.map((m, i) => (
        <div className="transcript-msg" key={i}>
          <div className={`msg-who ${m.who}`}>{m.who === 'you' ? 'You' : 'Nova'}</div>
          <div className={`msg-text ${m.who}`}>{m.text}</div>
        </div>
      ))}
      {isThinking && (
        <div className="transcript-msg">
          <div className="msg-who nova">Nova</div>
          <div className="msg-text"><div className="typing"><span/><span/><span/></div></div>
        </div>
      )}
      <div ref={ref} />
    </div>
  );
}

/* ── Conversation History ── */
function ConversationHistory() {
  const [convos, setConvos] = useState([]);
  const [hasMore, setHasMore] = useState(false);
  const [offset, setOffset] = useState(0);

  const loadConvos = (currentOffset) => {
    fetch(`${API_BASE}/conversations?offset=${currentOffset}&limit=20`)
      .then(r => r.json())
      .then(data => {
        setConvos(prev => currentOffset === 0 ? data.sessions : [...prev, ...data.sessions]);
        setHasMore(data.hasMore);
        setOffset(currentOffset + data.sessions.length);
      })
      .catch(() => {});
  };

  const deleteConvo = (session_id) => {
    fetch(`${API_BASE}/conversations/${session_id}`, { method: 'DELETE' })
      .then(() => setConvos(prev => prev.filter(c => c.session_id !== session_id)))
      .catch(() => {});
  };

  useEffect(() => { loadConvos(0); }, []);

  const formatDate = (iso) => {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  };

  return (
    <div style={{padding:'16px', overflowY:'auto', height:'100%'}}>
      <div style={{fontSize:'11px', letterSpacing:'0.08em', color:'rgba(200,212,232,0.45)', marginBottom:'12px'}}>HISTORY</div>
      {convos.length === 0 && <div style={{color:'rgba(200,212,232,0.4)', fontSize:'14px'}}>No conversations yet.</div>}
      {convos.map(c => (
        <div key={c.session_id} style={{display:'flex', alignItems:'center', padding:'10px 0', borderBottom:'1px solid rgba(55,138,221,0.08)'}}>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:'13px', color:'#C8D4E8', marginBottom:'3px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{c.preview}</div>
            <div style={{fontSize:'11px', color:'rgba(200,212,232,0.4)'}}>{formatDate(c.created_at)}</div>
          </div>
          <span onClick={() => deleteConvo(c.session_id)} style={{marginLeft:'12px', opacity:0.35, fontSize:'14px', padding:'4px 6px', cursor:'pointer'}}>✕</span>
        </div>
      ))}
      {hasMore && (
        <div onClick={() => loadConvos(offset)} style={{marginTop:'12px', fontSize:'13px', color:'rgba(55,138,221,0.7)', cursor:'pointer', textAlign:'center'}}>Load more…</div>
      )}
    </div>
  );
}

/* ── App ── */
function App() {
  const [menuOpen, setMenuOpen]   = useState(false);
  const [activeNav, setActiveNav] = useState('home');
  const [orbState, setOrbState]   = useState('idle');
  const [messages, setMessages]   = useState([]);
  const [isThinking, setIsThinking] = useState(false);

  const mediaRecorderRef = useRef(null);
  const audioChunksRef   = useRef([]);
  const micStreamRef     = useRef(null);
  const orbStateRef      = useRef('idle');
  useEffect(() => { orbStateRef.current = orbState; }, [orbState]);

  const orbWrapRef  = useRef(null);
  const audioRef    = useRef(null);
  const audioCtxRef = useRef(null);

  const unlockAudio = useCallback(() => {
    if (!audioRef.current) audioRef.current = new Audio();
    const audio = audioRef.current;

    // Clear leftover handlers so the silent clip doesn't fire a previous speakText
    // onended and snap the orb back to idle while the new recording is starting.
    audio.onended = null;
    audio.onerror = null;

    // PWA only: pipe the Audio element through an AudioContext unlocked during this
    // gesture. audio.play() then works after async gaps because it routes through
    // the AudioContext rather than directly through the browser's autoplay gate.
    if (window.navigator.standalone && !audioCtxRef.current) {
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const node = audioCtxRef.current.createMediaElementSource(audio);
      node.connect(audioCtxRef.current.destination);
    }
    if (audioCtxRef.current?.state === 'suspended') {
      audioCtxRef.current.resume().catch(() => {});
    }

    audio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
    audio.play().catch(() => {});
  }, []);

  const speakText = useCallback(async (text) => {
    try {
      // Stop mic — iOS routes audio to earpiece while mic is active
      if (micStreamRef.current) {
        micStreamRef.current.getTracks().forEach(t => t.stop());
        micStreamRef.current = null;
        // After mic releases the audio session, nudge AudioContext back to running
        if (audioCtxRef.current?.state === 'suspended') {
          audioCtxRef.current.resume().catch(() => {});
        }
        await new Promise(r => setTimeout(r, 300));
      }

      const res = await fetch(`${API_BASE}/speak`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) throw new Error('TTS failed');

      const blob = await res.blob();
      if (!blob.size) { setOrbState('idle'); return; }
      const url = URL.createObjectURL(blob);

      if (!audioRef.current) audioRef.current = new Audio();
      const audio = audioRef.current;
      audio.onended = null;
      audio.onerror = null;
      audio.src = url;
      audio.onended = () => { URL.revokeObjectURL(url); setOrbState('idle'); };
      audio.onerror = () => { URL.revokeObjectURL(url); setOrbState('idle'); };
      setOrbState('speaking');
      await audio.play();

    } catch (err) {
      console.error('speakText error:', err);
      setOrbState('idle');
    }
  }, []);

  const sendMessage = useCallback(async (text) => {
    setMessages(m => [...m, { who: 'you', text }]);
    setIsThinking(true);
    setOrbState('thinking');
    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION_ID })
      });
      const data = await res.json();
      setMessages(m => [...m, { who: 'nova', text: data.reply }]);
      setIsThinking(false);
      await speakText(data.reply);
    } catch {
      setMessages(m => [...m, { who: 'nova', text: 'Something went wrong. Please try again.' }]);
      setIsThinking(false);
      setOrbState('idle');
    }
  }, [speakText]);

  const startRecording = useCallback(async () => {
    if (orbStateRef.current !== 'idle') return;
    try {
      // Always request a fresh stream — iOS won't prompt again once permission is granted.
      // We need a new stream here because we stopped the mic before playback
      // to force audio through the speaker instead of the earpiece.
      micStreamRef.current = await navigator.mediaDevices.getUserMedia({ audio: true });
      const stream = micStreamRef.current;
      const recorder = new MediaRecorder(stream);
      audioChunksRef.current = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
      recorder.onstop = async () => {
        const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
        setOrbState('thinking');
        try {
          const fd = new FormData();
          fd.append('audio', blob, 'recording.webm');
          const res = await fetch(`${API_BASE}/transcribe`, { method: 'POST', body: fd });
          if (!res.ok) throw new Error();
          const { text } = await res.json();
          if (text?.trim()) await sendMessage(text.trim());
          else setOrbState('idle');
        } catch {
          setMessages(m => [...m, { who: 'nova', text: "Voice isn't set up yet — type your message below." }]);
          setOrbState('idle');
        }
      };
      recorder.start();
      mediaRecorderRef.current = recorder;
      setOrbState('listening');
    } catch (err) {
      console.error('Mic error:', err);
    }
  }, [sendMessage]);

  const stopRecording = useCallback(() => {
    if (mediaRecorderRef.current?.state !== 'inactive') {
      mediaRecorderRef.current.stop();
    }
  }, []);

  const stopSpeaking = useCallback(() => {
    const audio = audioRef.current;
    if (audio) {
      audio.pause();
      audio.onended = null;
      audio.onerror = null;
    }
    setOrbState('idle');
  }, []);

  const toggleOrb = useCallback(() => {
    unlockAudio(); // must happen during the user gesture, before any async work
    if (orbStateRef.current === 'idle') startRecording();
    else if (orbStateRef.current === 'listening') stopRecording();
    else if (orbStateRef.current === 'speaking') stopSpeaking();
  }, [unlockAudio, startRecording, stopRecording, stopSpeaking]);

  const hint = orbState === 'listening' ? 'Listening… tap to send'
    : orbState === 'thinking'  ? 'Nova is thinking…'
    : orbState === 'speaking'  ? 'Tap orb to interrupt'
    : 'Tap orb to speak';

  return (
    <div className="app">
      <header className="header">
        <div className="header-title">Nova</div>
        <button className="hamburger" onClick={() => setMenuOpen(true)} aria-label="Menu">
          <span/><span/><span/>
        </button>
      </header>

      <Menu open={menuOpen} onClose={() => setMenuOpen(false)} active={activeNav} setActive={setActiveNav} />

      <main className="main">
        {activeNav === 'history' ? (
          <ConversationHistory />
        ) : (
          <div className="main-inner">
            <Orb state={orbState} onClick={toggleOrb} orbRef={orbWrapRef} />
            <div className={`hint ${orbState}`}>{hint}</div>
            <InputBar onSend={sendMessage} disabled={orbState === 'thinking'} />
            <Transcript messages={messages} isThinking={isThinking} />
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js').catch(() => {}));
}
</script>
</body>
</html>
